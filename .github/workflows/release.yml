name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint code
        run: deno lint

      - name: Type check
        run: deno check src/cli.ts

      - name: Run tests
        run: deno task test

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin manifest
        run: claude plugin validate .

  release-please:
    needs: [ci, validate-plugin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  update-marketplace:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Update marketplace
        uses: wyattjoh/claude-code-marketplace@v1
        with:
          plugin-name: stacked-prs
          version: ${{ needs.release-please.outputs.version }}
          ref: ${{ needs.release-please.outputs.tag_name }}
          sha: ${{ github.sha }}
          token: ${{ secrets.MARKETPLACE_PAT }}

  homebrew-build:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            clipboard: pbcopy
          - target: x86_64-apple-darwin
            clipboard: pbcopy
          - target: aarch64-unknown-linux-gnu
            clipboard: xclip,wl-copy
          - target: x86_64-unknown-linux-gnu
            clipboard: xclip,wl-copy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binary
        run: |
          deno compile \
            --config deno.json \
            --allow-run=git,gh,${{ matrix.clipboard }} \
            --allow-env \
            --allow-read \
            --target ${{ matrix.target }} \
            -o stacked-prs \
            src/cli.ts

      - name: Create archive
        run: tar czf stacked-prs-${{ matrix.target }}.tar.gz stacked-prs

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stacked-prs-${{ matrix.target }}
          path: stacked-prs-${{ matrix.target }}.tar.gz

  homebrew-release:
    needs: [release-please, homebrew-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "$TAG" artifacts/*.tar.gz \
            --repo ${{ github.repository }} \
            --clobber

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          cd artifacts
          JSON="{"
          FIRST=true
          for f in stacked-prs-*.tar.gz; do
            target="${f#stacked-prs-}"
            target="${target%.tar.gz}"
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON="${JSON},"
            fi
            JSON="${JSON}\"${target}\":\"${sha}\""
          done
          JSON="${JSON}}"
          echo "json=${JSON}" >> $GITHUB_OUTPUT
          echo "Checksums: ${JSON}"

      - name: Update Homebrew formula
        uses: wyattjoh/homebrew-bump-revision@v1
        with:
          tap: wyattjoh/homebrew-stable
          formula: stacked-prs
          mode: checksums
          tag: ${{ needs.release-please.outputs.tag_name }}
          binary-name: stacked-prs
          checksums: ${{ steps.checksums.outputs.json }}
          source-repository: ${{ github.repository }}
          github-token: ${{ secrets.HOMEBREW_PAT }}
